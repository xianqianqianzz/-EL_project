<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>路径反馈 | 南京大学仙林校区地图</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/path-editor.css?v=pan-zoom-v1">
</head>
<body class="editor-page">
  <header class="site-header editor-header">
    <a class="brand" href="../map.html"><span class="brand-mark">NJU</span><span><strong>路径反馈</strong><small>仙林校区地图纠错</small></span></a>
    <nav class="site-nav"><a href="../map.html">返回校园地图</a><a href="../schedule.html">我的日程</a></nav>
    <div class="zoom-controls" aria-label="地图缩放">
      <button id="zoom-out" type="button" title="缩小">−</button>
      <span id="zoom-value">100%</span>
      <button id="zoom-in" type="button" title="放大">＋</button>
      <button id="zoom-fit" type="button">适合窗口</button>
    </div>
  </header>

  <main class="editor-shell">
    <aside class="editor-panel">
      <div class="editor-intro"><span class="eyebrow">PATH CORRECTION</span><h1>标注真实可行路径</h1><p>只提交你观察到的路径变化。申请获批准前不会修改正式地图。</p></div>
      <section>
        <h2>选择操作</h2>
        <div class="mode-grid">
          <button id="mode-node" class="active" type="button"><strong>添加节点</strong><span>在道路转折处点击</span></button>
          <button id="mode-edge" type="button"><strong>连接节点</strong><span>依次点击两个节点</span></button>
          <button id="mode-remove-edge" type="button"><strong>删除错误边</strong><span>点击不应通行的边</span></button>
        </div>
        <div class="editor-actions"><button id="undo" type="button">撤销</button><button id="clear-edge-selection" type="button">取消当前连边</button></div>
        <div class="counts"><span>新增节点 <b id="node-count">0</b></span><span>新增边 <b id="edge-count">0</b></span><span>删除边 <b id="removed-count">0</b></span></div>
        <p id="status" class="editor-status">正在加载正式地图…</p>
      </section>
      <section>
        <h2>提交说明</h2>
        <label>申请标题<input id="proposal-title" maxlength="100" placeholder="例如：图书馆东侧新增通道"></label>
        <label>现场说明<textarea id="proposal-description" maxlength="2000" placeholder="请说明现场情况、通行方向和修改原因，至少 10 个字"></textarea></label>
        <button id="submit-proposal" class="button button-primary submit-proposal" type="button">提交路径修改申请</button>
      </section>
    </aside>
    <section class="editor-map">
      <div class="canvas-wrap" id="canvas-wrap"><canvas id="canvas" width="1200" height="800"></canvas></div>
    </section>
  </main>
  <script src="../js/config.js"></script>
  <script src="../js/path-editor.js?v=pan-zoom-v1"></script>
</body>
</html>
