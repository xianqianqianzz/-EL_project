<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>地图节点与边标注工具</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      height: 100vh;
      display: grid;
      grid-template-columns: 320px 1fr;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      color: #263238;
      background: #eef2f4;
    }

    aside {
      background: #ffffff;
      border-right: 1px solid #d8dee3;
      overflow: auto;
      padding: 16px;
    }

    main {
      position: relative;
      overflow: hidden;
      background: #dfe5e8;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    h2 {
      margin: 18px 0 8px;
      font-size: 13px;
      color: #546e7a;
      border-bottom: 1px solid #e0e6ea;
      padding-bottom: 6px;
    }

    label {
      display: block;
      font-size: 12px;
      color: #546e7a;
      margin: 10px 0 4px;
    }

    input,
    select,
    textarea,
    button {
      font: inherit;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid #cfd8dc;
      border-radius: 6px;
      padding: 8px;
      background: #ffffff;
    }

    textarea {
      min-height: 140px;
      resize: vertical;
      font-family: Consolas, "Courier New", monospace;
      font-size: 12px;
    }

    button {
      border: 1px solid #b0bec5;
      border-radius: 6px;
      padding: 8px 10px;
      background: #ffffff;
      cursor: pointer;
    }

    button:hover {
      background: #f3f6f8;
    }

    button.primary {
      background: #176b87;
      color: #ffffff;
      border-color: #176b87;
    }

    button.primary:hover {
      background: #13586f;
    }

    button.active {
      background: #263238;
      color: #ffffff;
      border-color: #263238;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .button-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .status {
      margin-top: 12px;
      padding: 8px;
      border-radius: 6px;
      background: #edf7ed;
      color: #2e5d34;
      font-size: 12px;
      line-height: 1.5;
      min-height: 34px;
    }

    .hint {
      margin: 0;
      color: #546e7a;
      font-size: 12px;
      line-height: 1.6;
    }

    .canvas-wrap {
      position: absolute;
      inset: 16px;
      border: 1px solid #b0bec5;
      background: #ffffff;
      overflow: auto;
    }

    canvas {
      display: block;
      cursor: crosshair;
      background: #fafafa;
    }

    .summary {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
      font-size: 12px;
    }

    .summary div {
      padding: 8px;
      border-radius: 6px;
      background: #f5f7f8;
    }

    @media (max-width: 860px) {
      body {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
      }

      aside {
        max-height: 48vh;
        border-right: 0;
        border-bottom: 1px solid #d8dee3;
      }

      .canvas-wrap {
        inset: 8px;
      }
    }
  </style>
</head>
<body>
  <aside>
    <h1>地图节点与边标注工具</h1>

    <h2>项目</h2>
    <label for="area-id">区域 ID</label>
    <input id="area-id" value="outdoor-xianlin">

    <label for="map-name">地图名称</label>
    <input id="map-name" value="outdoor-xianlin">

    <div class="row">
      <div>
        <label for="building-id">建筑 ID</label>
        <input id="building-id" value="">
      </div>
      <div>
        <label for="floor">楼层</label>
        <input id="floor" type="number" value="0">
      </div>
    </div>

    <label for="image-input">图片</label>
    <input id="image-input" type="file" accept="image/*">

    <label for="import-json">继续编辑已有 area.json</label>
    <input id="import-json" type="file" accept=".json,application/json">

    <label for="meters-per-pixel">每像素米数</label>
    <input id="meters-per-pixel" type="number" min="0.001" step="0.001" value="0.21">

    <h2>模式</h2>
    <div class="button-row">
      <button id="mode-place" class="active" type="button">地点 place</button>
      <button id="mode-node" type="button">路网节点 node</button>
      <button id="mode-edge" type="button">连边 edge</button>
    </div>

    <div id="place-fields">
      <h2>地点 place</h2>
      <label for="point-label">地点标签</label>
      <input id="point-label" placeholder="如 南门、逸夫楼入口">

      <label for="place-building-id">关联建筑 ID（可选）</label>
      <input id="place-building-id" placeholder="如 library；需要进入室内时填写">
    </div>

    <h2>边 edge</h2>
    <p class="hint">连边模式下，依次点击两个节点即可创建边。弯路请先添加多个节点，再逐段连边。</p>

    <label for="review-status">审核状态</label>
    <select id="review-status">
      <option value="draft">draft</option>
      <option value="needs-review">needs-review</option>
      <option value="reviewed">reviewed</option>
    </select>

    <div class="button-row">
      <button id="undo" type="button">撤销</button>
      <button id="clear" type="button">清空</button>
    </div>

    <div class="summary">
      <div>地点：<span id="place-count">0</span></div>
      <div>节点：<span id="node-count">0</span></div>
      <div>边：<span id="edge-count">0</span></div>
    </div>

    <div id="status" class="status">加载图片后开始标注。</div>

    <h2>导出</h2>
    <div class="button-row">
      <button id="export-json" class="primary" type="button">生成 JSON</button>
      <button id="download-json" type="button">下载</button>
    </div>
    <label for="output">JSON</label>
    <textarea id="output" spellcheck="false"></textarea>
  </aside>

  <main>
    <div class="canvas-wrap">
      <canvas id="canvas" width="1200" height="800"></canvas>
    </div>
  </main>

  <script>
    const state = {
      mode: 'place',
      image: null,
      imageName: '',
      places: [],
      nodes: [],
      edges: [],
      links: [],
      selectedEdgeNodeId: null,
      history: []
    };

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const statusEl = document.getElementById('status');
    const outputEl = document.getElementById('output');

    const fields = {
      areaId: document.getElementById('area-id'),
      mapName: document.getElementById('map-name'),
      buildingId: document.getElementById('building-id'),
      floor: document.getElementById('floor'),
      metersPerPixel: document.getElementById('meters-per-pixel'),
      pointLabel: document.getElementById('point-label'),
      placeBuildingId: document.getElementById('place-building-id'),
      reviewStatus: document.getElementById('review-status')
    };

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function normalizePlaceLabel(place) {
      const base = place.label || place.name || place.id;
      const aliases = (place.aliases || []).filter(alias => alias && !base.includes(alias));
      return aliases.length ? `${base}（${aliases.join('、')}）` : base;
    }

    function setMode(mode) {
      state.mode = mode;
      document.getElementById('mode-place').classList.toggle('active', mode === 'place');
      document.getElementById('mode-node').classList.toggle('active', mode === 'node');
      document.getElementById('mode-edge').classList.toggle('active', mode === 'edge');
      document.getElementById('place-fields').hidden = mode !== 'place';
      if (mode !== 'edge') state.selectedEdgeNodeId = null;
      setStatus(
        mode === 'place' ? '地点模式：填写标签后点击图片。地点会自动生成同位置的路网节点。' :
        mode === 'node' ? '节点模式：点击图片添加自动编号节点，不需要填写标签。' :
        '连边模式：先点击一个节点，再点击另一个节点即可创建边。'
      );
      render();
    }

    function nextId(prefix) {
      const safeName = (fields.areaId.value.trim() || 'area').replace(/[^a-zA-Z0-9_-]+/g, '-');
      const used = new Set([
        ...state.places.map(item => item.id),
        ...state.nodes.map(item => item.id),
        ...state.edges.map(item => item.id)
      ]);
      let serial = 1;
      let id;
      do {
        id = `${safeName}-${prefix}-${String(serial).padStart(3, '0')}`;
        serial++;
      } while (used.has(id));
      return id;
    }

    function getPoint(event) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      return {
        x: Math.round((event.clientX - rect.left) * scaleX),
        y: Math.round((event.clientY - rect.top) * scaleY)
      };
    }

    function pushHistory() {
      state.history.push(JSON.stringify({
        places: state.places,
        nodes: state.nodes,
        edges: state.edges,
        links: state.links,
        selectedEdgeNodeId: state.selectedEdgeNodeId
      }));
      if (state.history.length > 50) state.history.shift();
    }

    function addPoint(point) {
      const placeLabel = fields.pointLabel.value.trim();
      if (state.mode === 'place' && !placeLabel) {
        setStatus('请先填写标签，再点击图片。');
        return;
      }
      pushHistory();
      const nodeId = nextId('node');
      state.nodes.push({
        id: nodeId,
        type: 'node',
        x: point.x,
        y: point.y
      });
      if (state.mode === 'place') {
        const placeId = nextId('place');
        const buildingId = fields.placeBuildingId.value.trim();
        state.places.push({
          id: placeId,
          type: 'place',
          label: placeLabel,
          ...(buildingId ? { buildingId } : {}),
          routeNodeId: nodeId,
          x: point.x,
          y: point.y,
          reviewStatus: 'draft'
        });
      }
      fields.pointLabel.value = '';
      fields.placeBuildingId.value = '';
      render();
      setStatus(state.mode === 'place' ?
        `已添加地点 ${placeLabel}，对应节点为 ${nodeId}` :
        `已添加节点 ${nodeId}`);
    }

    function findNodeAt(point) {
      const hitRadius = Math.max(10, Math.round(Math.min(canvas.width, canvas.height) * 0.004));
      let best = null;
      let bestDistance = hitRadius;
      for (const node of state.nodes) {
        const distance = Math.hypot(node.x - point.x, node.y - point.y);
        if (distance <= bestDistance) {
          best = node;
          bestDistance = distance;
        }
      }
      return best;
    }

    function handleEdgeNodeClick(point) {
      const node = findNodeAt(point);
      if (!node) {
        setStatus('请点击已有节点；弯路需要先切换到 node 模式添加节点。');
        return;
      }
      if (!state.selectedEdgeNodeId) {
        state.selectedEdgeNodeId = node.id;
        render();
        setStatus(`已选择第一个节点 ${node.id}；请点击第二个节点完成连边。`);
        return;
      }
      if (state.selectedEdgeNodeId === node.id) {
        setStatus('不能连接同一个节点，请点击另一个节点。');
        return;
      }
      const from = state.selectedEdgeNodeId;
      const to = node.id;
      const duplicate = state.edges.some(edge =>
        (edge.from === from && edge.to === to) || (edge.from === to && edge.to === from)
      );
      if (duplicate) {
        state.selectedEdgeNodeId = null;
        render();
        setStatus(`节点 ${from} 与 ${to} 已存在边。`);
        return;
      }
      pushHistory();
      const id = nextId('edge');
      state.edges.push({
        id,
        from,
        to,
        type: 'edge',
        walkable: true,
        reviewStatus: fields.reviewStatus.value
      });
      state.selectedEdgeNodeId = null;
      render();
      updateCounts();
      setStatus(`已创建边 ${id}: ${from} ↔ ${to}`);
    }

    function undo() {
      const snapshot = state.history.pop();
      if (!snapshot) {
        setStatus('没有可撤销的操作。');
        return;
      }
      const data = JSON.parse(snapshot);
      state.nodes = data.nodes;
      state.edges = data.edges;
      state.selectedEdgeNodeId = data.selectedEdgeNodeId || null;
      state.places = data.places || [];
      state.links = data.links || [];
      render();
      setStatus('已撤销上一步。');
    }

    function clearAll() {
      pushHistory();
      state.nodes = [];
      state.edges = [];
      state.places = [];
      state.links = [];
      state.selectedEdgeNodeId = null;
      render();
      setStatus('已清空标注。');
    }

    function updateCounts() {
      document.getElementById('place-count').textContent = String(state.places.length);
      document.getElementById('node-count').textContent = String(state.nodes.length);
      document.getElementById('edge-count').textContent = String(state.edges.length);
    }

    function drawBase() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#fafafa';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      if (state.image) {
        ctx.drawImage(state.image, 0, 0, canvas.width, canvas.height);
      }
    }

    function drawPath(points, color, width, dash = []) {
      if (points.length < 2) return;
      ctx.save();
      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      ctx.setLineDash(dash);
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.beginPath();
      ctx.moveTo(points[0][0], points[0][1]);
      for (let i = 1; i < points.length; i++) {
        ctx.lineTo(points[i][0], points[i][1]);
      }
      ctx.stroke();
      ctx.restore();
    }

    function drawSelectedEndpoint(node, color, text) {
      if (!node) return;
      ctx.save();
      ctx.lineWidth = 4;
      ctx.strokeStyle = '#ffffff';
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(node.x, node.y, 13, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 13px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, node.x, node.y + 1);
      ctx.restore();
    }

    function render() {
      drawBase();
      for (const edge of state.edges) {
        const fromNode = state.nodes.find(node => node.id === edge.from);
        const toNode = state.nodes.find(node => node.id === edge.to);
        if (fromNode && toNode) {
          drawPath(
            [[fromNode.x, fromNode.y], [toNode.x, toNode.y]],
            edge.reviewStatus === 'needs-review' ? '#d97706' : '#176b87',
            4
          );
        }
      }

      ctx.save();
      ctx.font = '12px sans-serif';
      ctx.textBaseline = 'top';
      const placeNodeIds = new Set(state.places.map(place => place.routeNodeId));
      for (const node of state.nodes) {
        ctx.beginPath();
        ctx.fillStyle = placeNodeIds.has(node.id) ? '#c62828' : '#263238';
        ctx.arc(node.x, node.y, placeNodeIds.has(node.id) ? 7 : 5, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
      if (state.mode === 'edge' && state.selectedEdgeNodeId) {
        drawSelectedEndpoint(
          state.nodes.find(node => node.id === state.selectedEdgeNodeId),
          '#15803d',
          '1'
        );
      }
      updateCounts();
    }

    function buildExport() {
      return {
        version: 2,
        areaId: fields.areaId.value.trim(),
        name: fields.mapName.value.trim(),
        layer: Number(fields.floor.value) === 0 ? 'outdoor' : 'indoor',
        coordinateSystem: 'image-pixel',
        image: {
          path: 'map.png',
          width: canvas.width,
          height: canvas.height,
          metersPerPixel: Number(fields.metersPerPixel.value)
        },
        buildingId: fields.buildingId.value.trim() || undefined,
        floor: Number(fields.floor.value),
        source: {
          label: '地图节点与边标注工具',
          reviewStatus: 'draft',
          notes: `直接基于 ${state.imageName || 'map.png'} 标注`
        },
        places: state.places.map(place => {
          const { name, aliases, icon, ...cleanPlace } = place;
          return { ...cleanPlace, type: 'place', label: normalizePlaceLabel(place) };
        }),
        nodes: state.nodes.map(node => {
          const { label, connections, ...cleanNode } = node;
          return { ...cleanNode, type: 'node' };
        }),
        edges: state.edges.map(edge => {
          const { path, label, ...cleanEdge } = edge;
          return { ...cleanEdge, type: 'edge' };
        }),
        links: state.links.map(link => {
          const { type, ...cleanLink } = link;
          return { ...cleanLink, label: link.label || '区域入口连接' };
        })
      };
    }

    function exportJson() {
      const data = buildExport();
      outputEl.value = JSON.stringify(data, null, 2);
      setStatus('JSON 已生成，可复制或下载。');
    }

    function downloadJson() {
      exportJson();
      const blob = new Blob([outputEl.value], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'area.json';
      a.click();
      URL.revokeObjectURL(url);
    }

    document.getElementById('mode-place').addEventListener('click', () => setMode('place'));
    document.getElementById('mode-node').addEventListener('click', () => setMode('node'));
    document.getElementById('mode-edge').addEventListener('click', () => setMode('edge'));
    document.getElementById('undo').addEventListener('click', undo);
    document.getElementById('clear').addEventListener('click', clearAll);
    document.getElementById('export-json').addEventListener('click', exportJson);
    document.getElementById('download-json').addEventListener('click', downloadJson);

    document.getElementById('import-json').addEventListener('change', event => {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const data = JSON.parse(reader.result);
          if (data.coordinateSystem !== 'image-pixel') {
            throw new Error('只支持 image-pixel 区域数据');
          }
          state.places = (data.places || []).map(place => ({
            ...Object.fromEntries(
              Object.entries(place).filter(([key]) => !['name', 'aliases', 'icon'].includes(key))
            ),
            type: 'place',
            label: normalizePlaceLabel(place)
          }));
          state.nodes = (data.nodes || []).map(node => ({
            ...Object.fromEntries(
              Object.entries(node).filter(([key]) => !['label', 'connections'].includes(key))
            ),
            type: 'node'
          }));
          state.edges = (data.edges || []).map(edge => ({
            ...Object.fromEntries(
              Object.entries(edge).filter(([key]) => !['path', 'label'].includes(key))
            ),
            type: 'edge'
          }));
          state.links = (data.links || []).map(link => {
            const { type, ...cleanLink } = link;
            return { ...cleanLink, label: link.label || '区域入口连接' };
          });
          state.selectedEdgeNodeId = null;
          state.history = [];
          fields.areaId.value = data.areaId || fields.areaId.value;
          fields.mapName.value = data.name || data.areaId || fields.mapName.value;
          fields.buildingId.value = data.buildingId || '';
          fields.floor.value = data.floor ?? ((data.layer || data.type) === 'outdoor' ? 0 : 1);
          fields.metersPerPixel.value = data.image?.metersPerPixel ?? fields.metersPerPixel.value;
          if (Number.isFinite(data.image?.width) && Number.isFinite(data.image?.height)) {
            canvas.width = data.image.width;
            canvas.height = data.image.height;
          }
          render();
          setStatus(`已导入 ${file.name}；请继续选择同一张 map.png 后编辑。`);
        } catch (error) {
          setStatus(`导入失败：${error.message}`);
        }
      };
      reader.readAsText(file, 'utf-8');
    });

    document.getElementById('image-input').addEventListener('change', event => {
      const file = event.target.files[0];
      if (!file) return;
      const image = new Image();
      image.onload = () => {
        state.image = image;
        state.imageName = file.name;
        canvas.width = image.naturalWidth;
        canvas.height = image.naturalHeight;
        render();
        setStatus(`已加载图片 ${file.name}，尺寸 ${canvas.width} x ${canvas.height}`);
      };
      image.src = URL.createObjectURL(file);
    });

    canvas.addEventListener('click', event => {
      const point = getPoint(event);
      if (state.mode === 'place' || state.mode === 'node') addPoint(point);
      else handleEdgeNodeClick(point);
    });

    setMode('place');
    render();
  </script>
</body>
</html>
