name: Baseline Check

on:
  pull_request:
  push:
    branches:
      - development
      - master
      - main

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run encoding, syntax, and map data checks
        run: npm run check
