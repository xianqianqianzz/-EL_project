<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>南京大学仙林校区地图</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="css/main.css?v=phase2-v1">
  <link rel="stylesheet" href="css/map.css?v=area-v6">
  <link rel="stylesheet" href="css/indoor.css">
</head>
<body>
  <header id="header">
    <div class="logo">南大校园地图</div>
    <div class="search-container">
      <div class="search-row">
        <div class="search-field">
          <label for="search-from">起点</label>
          <div class="search-field-control">
            <input type="text" id="search-from" placeholder="搜索地点..." autocomplete="off">
            <button type="button" class="btn-select-map" id="btn-select-from">选择起点</button>
          </div>
          <ul class="suggestions" id="suggestions-from"></ul>
        </div>
        <button class="swap-btn" id="btn-swap" title="交换起终点" aria-label="交换起终点">⇄</button>
        <div class="search-field">
          <label for="search-to">终点</label>
          <div class="search-field-control">
            <input type="text" id="search-to" placeholder="搜索地点..." autocomplete="off">
            <button type="button" class="btn-select-map" id="btn-select-to">选择终点</button>
          </div>
          <ul class="suggestions" id="suggestions-to"></ul>
        </div>
        <button id="btn-route" class="btn-route">规划路线</button>
      </div>
    </div>
    <button type="button" id="btn-trips" class="btn-trips hidden">行程</button>
    <div class="account">
      <button type="button" id="btn-account" class="btn-account">登录</button>
      <div id="account-menu" class="account-menu hidden">
        <strong id="account-name"></strong>
        <span id="account-role"></span>
        <button type="button" id="btn-logout">退出登录</button>
      </div>
    </div>
  </header>

  <div id="main-container">
    <aside id="info-panel">
      <div class="panel-section" id="panel-empty">
        <p class="hint">搜索地点，或点击“选择起点/终点”后选择路网节点</p>
      </div>
      <div class="panel-section hidden" id="panel-route">
        <h3>路线信息</h3>
        <div class="route-summary">
          <span class="route-dist"></span>
          <span class="route-time"></span>
        </div>
        <div class="route-segments"></div>
        <h4>途经节点</h4>
        <ol class="route-steps"></ol>
      </div>
    </aside>

    <aside id="trip-drawer" class="trip-drawer hidden">
      <div class="trip-drawer-header">
        <h2>我的行程</h2>
        <div>
          <button type="button" id="btn-add-trip" title="添加行程" aria-label="添加行程" disabled>＋</button>
          <button type="button" id="btn-close-trips" title="关闭" aria-label="关闭">×</button>
        </div>
      </div>
      <section>
        <h3>今天</h3>
        <div id="today-trip-list" class="trip-list"></div>
      </section>
      <section>
        <h3>全部行程</h3>
        <div id="all-trip-list" class="trip-list"></div>
      </section>
    </aside>

    <main id="map-container">
      <div id="map-selection-banner" class="map-selection-banner hidden">
        <span id="map-selection-text"></span>
        <button type="button" id="btn-cancel-selection">取消</button>
      </div>
      <div id="outdoor-map"></div>
    </main>
  </div>

  <dialog id="auth-dialog" class="auth-dialog">
    <div class="auth-dialog-header">
      <div class="auth-tabs" aria-label="账号操作">
        <button type="button" id="tab-login" class="active">登录</button>
        <button type="button" id="tab-register">注册</button>
      </div>
      <button type="button" id="btn-close-auth" class="dialog-close" aria-label="关闭">×</button>
    </div>
    <p id="auth-status" class="auth-status" aria-live="polite"></p>
    <form id="login-form" class="auth-form">
      <label>用户名<input name="username" autocomplete="username" required></label>
      <label>密码<input name="password" type="password" autocomplete="current-password" required></label>
      <button type="submit" class="btn-auth-submit">登录</button>
    </form>
    <form id="register-form" class="auth-form hidden">
      <label>用户名<input name="username" minlength="3" maxlength="32" pattern="[A-Za-z0-9_]+" autocomplete="username" required></label>
      <label>邮箱<input name="email" type="email" autocomplete="email" required></label>
      <label>显示名称<input name="display_name" maxlength="50" autocomplete="name" required></label>
      <label>密码<input name="password" type="password" minlength="8" maxlength="128" autocomplete="new-password" required></label>
      <label>确认密码<input name="password_confirm" type="password" minlength="8" maxlength="128" autocomplete="new-password" required></label>
      <button type="submit" class="btn-auth-submit">创建账号</button>
    </form>
  </dialog>

  <dialog id="trip-dialog" class="auth-dialog trip-dialog">
    <div class="auth-dialog-header">
      <h2 id="trip-dialog-title">添加行程</h2>
      <button type="button" id="btn-close-trip-dialog" class="dialog-close" aria-label="关闭">×</button>
    </div>
    <p id="trip-status" class="auth-status" aria-live="polite"></p>
    <form id="trip-form" class="auth-form">
      <label>行程名称<input name="title" maxlength="80" required></label>
      <div class="trip-form-grid">
        <label>起点<select name="from_place_id" required></select></label>
        <label>终点<select name="to_place_id" required></select></label>
      </div>
      <div class="trip-form-grid">
        <label>开始日期<input name="start_date" type="date" required></label>
        <label>最晚到达时间<input name="latest_arrival_time" type="time" required></label>
      </div>
      <div class="trip-form-grid">
        <label>重复
          <select name="recurrence" id="trip-recurrence">
            <option value="once">一次性</option>
            <option value="daily">每天</option>
            <option value="weekly">每周</option>
            <option value="monthly">每月</option>
          </select>
        </label>
        <label>结束日期<input name="end_date" type="date" disabled></label>
      </div>
      <label>提前提醒（分钟）<input name="reminder_minutes" type="number" min="0" max="120" value="10" required></label>
      <button type="submit" id="btn-save-trip" class="btn-auth-submit">保存行程</button>
    </form>
  </dialog>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/config.js?v=phase1-v1"></script>
  <script src="js/data/validator.js?v=area-v4"></script>
  <script src="js/data/loader.js?v=phase1-v1"></script>
  <script src="js/nav/graph.js?v=area-v4"></script>
  <script src="js/nav/astar.js?v=area-v4"></script>
  <script src="js/nav/outdoor-graph.js?v=area-v4"></script>
  <script src="js/nav/path-renderer.js?v=area-v4"></script>
  <script src="js/map/outdoor.js?v=phase1-v1"></script>
  <script src="js/ui/search.js?v=area-v4"></script>
  <script src="js/ui/panel.js?v=area-v4"></script>
  <script src="js/app.js?v=phase3-v1"></script>
  <script src="js/auth.js?v=phase3-v1"></script>
  <script src="js/trips.js?v=phase3-v1"></script>
</body>
</html>
