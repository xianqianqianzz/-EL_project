<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 | 仙林校区地图</title>
  <link rel="stylesheet" href="css/main.css?v=ceremony-v1">
  <link rel="stylesheet" href="css/account.css?v=ceremony-v1">
</head>
<body class="account-page">
  <header class="account-topbar">
    <a class="brand" href="map.html">
      <span class="brand-mark">NJU</span>
      <span><strong>南京大学</strong><small>仙林校区地图与日程系统</small></span>
    </a>
    <a class="text-link" href="map.html">先浏览校园地图 →</a>
  </header>

  <main class="account-stage">
    <section class="account-intro">
      <span class="eyebrow">NANJING UNIVERSITY · XIANLIN</span>
      <h1>让每次出发，<br>都有明确的方向。</h1>
      <p>登录后可查看个人日程、建议出发时间与校园步行路线。游客仍可自由浏览地图。</p>
      <dl class="account-facts">
        <div><dt>122</dt><dd>个校园地点</dd></div>
        <div><dt>全天</dt><dd>日程提醒</dd></div>
        <div><dt>实时</dt><dd>路线规划</dd></div>
      </dl>
    </section>

    <section class="account-card" aria-labelledby="account-title">
      <div class="account-card-heading">
        <span class="account-seal">NJU</span>
        <div>
          <span class="eyebrow">个人校园助手</span>
          <h2 id="account-title">欢迎回来</h2>
        </div>
      </div>
      <div class="account-tabs" role="tablist">
        <button id="tab-login" class="active" type="button">登录</button>
        <button id="tab-register" type="button">注册</button>
      </div>
      <p id="auth-status" class="form-status" aria-live="polite"></p>
      <form id="login-form" class="account-form">
        <label>用户名<input name="username" autocomplete="username" placeholder="请输入用户名" required></label>
        <label>密码<input name="password" type="password" autocomplete="current-password" placeholder="请输入密码" required></label>
        <button type="submit" class="button button-primary">登录并进入地图</button>
      </form>
      <form id="register-form" class="account-form hidden">
        <div class="form-grid">
          <label>用户名<input name="username" minlength="3" maxlength="32" pattern="[A-Za-z0-9_]+" required></label>
          <label>显示名称<input name="display_name" maxlength="50" required></label>
        </div>
        <label>邮箱<input name="email" type="email" required></label>
        <label>密码<input name="password" type="password" minlength="8" maxlength="128" required></label>
        <label>确认密码<input name="password_confirm" type="password" minlength="8" maxlength="128" required></label>
        <button type="submit" class="button button-primary">创建账号</button>
      </form>
      <p class="account-note">首次登录将自动生成三条示例日程，方便立即体验。</p>
    </section>
  </main>

  <script src="js/config.js?v=separated-v1"></script>
  <script src="js/auth-client.js?v=separated-v1"></script>
  <script src="js/login-page.js?v=separated-v1"></script>
</body>
</html>
