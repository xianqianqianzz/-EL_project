<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>南京大学智能校园地图</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/map.css">
  <link rel="stylesheet" href="css/indoor.css">
</head>
<body>
  <!-- 顶部搜索栏 -->
  <header id="header">
    <div class="logo">🏫 南大校园地图</div>
    <div class="search-container">
      <div class="search-row">
        <div class="search-field">
          <label>起点</label>
          <input type="text" id="search-from" placeholder="搜索地点..." autocomplete="off">
          <ul class="suggestions" id="suggestions-from"></ul>
        </div>
        <button class="swap-btn" id="btn-swap" title="交换起终点">⇄</button>
        <div class="search-field">
          <label>终点</label>
          <input type="text" id="search-to" placeholder="搜索地点..." autocomplete="off">
          <ul class="suggestions" id="suggestions-to"></ul>
        </div>
        <button id="btn-route" class="btn-route">🔍 规划路线</button>
      </div>
    </div>
  </header>

  <!-- 主体区域 -->
  <div id="main-container">
    <!-- 左侧信息面板 -->
    <aside id="info-panel">
      <div class="panel-section" id="panel-empty">
        <p class="hint">搜索或点击地图选择起终点</p>
      </div>
      <div class="panel-section hidden" id="panel-route">
        <h3>路线信息</h3>
        <div class="route-summary">
          <span class="route-dist"></span>
          <span class="route-time"></span>
        </div>
        <div class="route-segments"></div>
        <h4>途经指引</h4>
        <ol class="route-steps"></ol>
      </div>
      <div class="panel-section hidden" id="panel-building">
        <h3 class="building-name"></h3>
        <p class="building-desc"></p>
        <button class="btn-enter" id="btn-enter-building">进入室内地图</button>
      </div>
    </aside>

    <!-- 地图容器 -->
    <main id="map-container">
      <div id="outdoor-map"></div>
      <div id="indoor-map" class="hidden">
        <div class="indoor-toolbar">
          <button id="btn-back-outdoor">← 返回室外</button>
          <span class="indoor-title"></span>
          <div class="floor-selector" id="floor-selector"></div>
        </div>
        <canvas id="indoor-canvas"></canvas>
      </div>
    </main>
  </div>

  <!-- 脚本：依赖顺序 -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/config.js"></script>
  <script src="js/data/validator.js"></script>
  <script src="js/data/loader.js"></script>
  <script src="js/nav/graph.js"></script>
  <script src="js/nav/astar.js"></script>
  <script src="js/nav/outdoor-graph.js"></script>
  <script src="js/nav/indoor-graph.js"></script>
  <script src="js/nav/path-renderer.js"></script>
  <script src="js/map/outdoor.js"></script>
  <script src="js/map/indoor.js"></script>
  <script src="js/map/layer-switch.js"></script>
  <script src="js/ui/marker-popup.js"></script>
  <script src="js/ui/search.js"></script>
  <script src="js/ui/panel.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
